name: Build App (EXE & DMG)

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发
  workflow_dispatch:     # 允许在 GitHub 网页上手动触发

jobs:
  # ==============================
  # 1. 编译 Windows EXE
  # ==============================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE via PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app.py;." --copy-metadata streamlit --name EchoApp run.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EchoApp-EXE
          path: dist/EchoApp.exe

  # ==============================
  # 2. 编译 macOS DMG (利用 M1 交叉编译 Intel 版本)
  # ==============================
  build-macos:
    runs-on: macos-latest  # 恢复使用稳定的最新服务器 (M1 架构)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'    # 【关键修改1】：强制在 M1 服务器上安装 Intel (x64) 版本的 Python

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS APP via PyInstaller
        # 【关键修改2】：明确告诉 PyInstaller 打包目标为 Intel 架构 (x86_64)
        run: |
          pyinstaller --noconfirm --windowed --target-arch x86_64 --add-data "app.py:." --copy-metadata streamlit --name EchoApp run.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package APP to DMG
        run: |
          create-dmg \
            --volname "EchoApp" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 150 \
            "EchoApp.dmg" \
            "dist/EchoApp.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-EchoApp-DMG
          path: EchoApp.dmg
