name: Build App (EXE & DMG)

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发
  workflow_dispatch:     # 允许在 GitHub 网页上手动触发

jobs:
  # ==============================
  # 1. 编译 Windows EXE
  # ==============================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE via PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app.py;." --copy-metadata streamlit --name EchoApp run.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EchoApp-EXE
          path: dist/EchoApp.exe

  # ==============================
  # 2. 编译 macOS DMG (使用原生的 macOS-12 Intel 服务器)
  # ==============================
  build-macos:
    runs-on: macos-12  # 【关键修改】：换成纯正的 Intel 服务器
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS APP via PyInstaller
        # 因为跑在 Intel 机器上，打包出来的自然就是 Intel 版本
        run: |
          pyinstaller --noconfirm --windowed --add-data "app.py:." --copy-metadata streamlit --name EchoApp run.py

      - name: Install create-dmg
        # 加上 || true 防止因为服务器已经预装了此工具而报错中断
        run: brew install create-dmg || true 

      - name: Package APP to DMG
        run: |
          create-dmg \
            --volname "EchoApp" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 150 \
            "EchoApp.dmg" \
            "dist/EchoApp.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-EchoApp-DMG
          path: EchoApp.dmg
