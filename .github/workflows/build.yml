name: Build App (EXE & DMG)

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发
  workflow_dispatch:     # 允许在 GitHub 网页上手动触发

jobs:
  # ==============================
  # 1. 编译 Windows EXE
  # ==============================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE via PyInstaller
        # Windows 路径分隔符使用分号 (;)
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app.py;." --copy-metadata streamlit --name EchoApp run.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EchoApp-EXE
          path: dist/EchoApp.exe

  # ==============================
  # 2. 编译 macOS DMG (适配 Intel 芯片)
  # ==============================
  build-macos:
    # 【关键修改 1】将 macos-latest 改为 macos-13，强制使用 Intel (x86_64) 架构的运行环境
    runs-on: macos-13 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS APP via PyInstaller
        # 【关键修改 2】添加 --target-arch x86_64，确保打包为 Intel 架构
        run: |
          pyinstaller --noconfirm --windowed --target-arch x86_64 --add-data "app.py:." --copy-metadata streamlit --name EchoApp run.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package APP to DMG
        run: |
          create-dmg \
            --volname "EchoApp" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 150 \
            "EchoApp.dmg" \
            "dist/EchoApp.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          # 修改了产物名称，方便区分
          name: macOS-Intel-EchoApp-DMG 
          path: EchoApp.dmg
